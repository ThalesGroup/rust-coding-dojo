name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      # cargo test is not run here: kata src/ files intentionally contain
      # unimplemented todo!()s for students to fill in (see solutions job in
      # ci.yml, which validates the reference solutions instead).
      - run: cargo build --workspace --exclude ownership-borrowing
