name: Stale

on:
  schedule:
    - cron: "30 1 * * *"

jobs:
  stale:
    name: Stale Issue & PR Management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 60 days. Marking as stale."
          stale-pr-message: "This PR has been inactive for 60 days. Marking as stale."
          close-issue-message: "Closing due to inactivity."
          close-pr-message: "Closing due to inactivity."
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: "enhancement,help wanted"
          exempt-pr-labels: "enhancement"
